# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — Staging project URL (iunqmpxp…)
#   SUPABASE_ANON_KEY  — Staging anon public key
#
# Pings pickup_frisbee schema on the shared staging project (Wave 1i).

name: Supabase keepalive

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API (pickup_frisbee)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_DB_SCHEMA: pickup_frisbee
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          curl -fsS \
            "${SUPABASE_URL}/rest/v1/groups?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept-Profile: ${SUPABASE_DB_SCHEMA}" \
            -H "Content-Profile: ${SUPABASE_DB_SCHEMA}"

          echo "Supabase keepalive OK (${SUPABASE_DB_SCHEMA})"
