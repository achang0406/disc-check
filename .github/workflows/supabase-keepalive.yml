# Keeps the Supabase free-tier project active (pauses after ~7 days of inactivity).
# Activity must hit the database — a static Vercel page load is not enough.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — Project URL from Supabase → Settings → API
#   SUPABASE_ANON_KEY  — anon public key from the same page

name: Supabase keepalive

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          curl -fsS \
            "${SUPABASE_URL}/rest/v1/groups?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"

          echo "Supabase keepalive OK"
