<!doctype html>
<html
  lang="en"
  style="background-color: #0a0a0a; color: #e8e8e8; color-scheme: dark"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PickupFrisbee" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>PickupFrisbee</title>
    <style>
      html,
      body {
        margin: 0;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="background-color: #0a0a0a; color: #e8e8e8">
    <script>
      (function () {
        var bg = "#0a0a0a";
        var text = "#e8e8e8";
        var scheme = "dark";

        try {
          if (localStorage.getItem("disc_theme") === "light") {
            bg = "#f4f4ef";
            text = "#1a1a1a";
            scheme = "light";
          }
        } catch (error) {
          // Storage unavailable — keep dark defaults.
        }

        var root = document.documentElement;
        root.style.backgroundColor = bg;
        root.style.color = text;
        root.style.colorScheme = scheme;
        document.body.style.backgroundColor = bg;
        document.body.style.color = text;

        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", bg);
        document
          .querySelector('meta[name="color-scheme"]')
          ?.setAttribute("content", scheme);
        document
          .querySelector('meta[name="apple-mobile-web-app-status-bar-style"]')
          ?.setAttribute(
            "content",
            scheme === "light" ? "default" : "black-translucent",
          );

        var ua = navigator.userAgent.toLowerCase();
        var isAppleMobile = /iphone|ipad|ipod/.test(ua);
        var isIpadOs =
          navigator.platform === "MacIntel" &&
          typeof navigator.maxTouchPoints === "number" &&
          navigator.maxTouchPoints > 1;
        var isStandalone =
          window.navigator.standalone === true ||
          window.matchMedia("(display-mode: standalone)").matches ||
          window.matchMedia("(display-mode: fullscreen)").matches;
        if ((isAppleMobile || isIpadOs) && isStandalone) {
          document.documentElement.classList.add("ios-standalone");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
